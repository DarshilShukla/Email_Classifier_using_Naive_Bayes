<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Spam Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.ham {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        
        .result.spam {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        
        .result.error {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
        
        .result-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .result.ham .result-title {
            color: #155724;
        }
        
        .result.spam .result-title {
            color: #721c24;
        }
        
        .result.error .result-title {
            color: #856404;
        }
        
        .result-details {
            color: #333;
            line-height: 1.6;
        }
        
        .confidence {
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        .confidence-bar {
            background: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease-out;
        }
        
        .confidence-fill.ham {
            background: #28a745;
        }
        
        .confidence-fill.spam {
            background: #dc3545;
        }
        
        .processing-time {
            margin-top: 10px;
            font-size: 0.85em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 SMS Spam Classifier</h1>
        <p class="subtitle">Enter a text message to check if it's spam or legitimate</p>
        
        <form id="classifyForm">
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea 
                    id="message" 
                    name="message" 
                    placeholder="Enter your SMS message here..."
                    required
                ></textarea>
            </div>
            
            <button type="submit" id="submitBtn">Classify Message</button>
        </form>
        
        <div id="result" class="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-details" id="resultDetails"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('classifyForm');
        const messageInput = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultDetails = document.getElementById('resultDetails');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            
            if (!message) {
                showError('Please enter a message');
                return;
            }
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Classifying...';
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult(data);
                } else {
                    showError(data.error || 'An error occurred');
                }
            } catch (error) {
                showError('Failed to connect to server');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Classify Message';
            }
        });
        
        function showResult(data) {
            const prediction = data.prediction;
            const confidence = data.confidence;
            const processingTime = data.processing_time;
            
            // Set result class
            resultDiv.className = 'result ' + prediction;
            
            // Set title
            if (prediction === 'ham') {
                resultTitle.textContent = '✅ Legitimate Message (Ham)';
            } else {
                resultTitle.textContent = '⚠️ Spam Detected';
            }
            
            // Set details
            const hamConfidence = (confidence.ham * 100).toFixed(1);
            const spamConfidence = (confidence.spam * 100).toFixed(1);
            
            resultDetails.innerHTML = `
                <div class="confidence">
                    <strong>Confidence:</strong>
                    <div style="margin-top: 8px;">
                        <div>Ham: ${hamConfidence}%</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill ham" style="width: ${hamConfidence}%"></div>
                        </div>
                    </div>
                    <div style="margin-top: 8px;">
                        <div>Spam: ${spamConfidence}%</div>
                        <div class="confidence-bar">
                            <div class="confidence-fill spam" style="width: ${spamConfidence}%"></div>
                        </div>
                    </div>
                </div>
                <div class="processing-time">
                    Processing time: ${processingTime}s
                </div>
            `;
            
            resultDiv.style.display = 'block';
        }
        
        function showError(message) {
            resultDiv.className = 'result error';
            resultTitle.textContent = '❌ Error';
            resultDetails.innerHTML = `<p>${message}</p>`;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
